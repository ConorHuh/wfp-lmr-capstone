# datasets.yaml — LMR Data Platform Configuration

# Global settings
global:
  region: "us-east-1"
  schedule_interval_days: 10
  s3_bucket: "lmr-data-cogs-dev"
  s3_prefix: "ingested"
  log_level: "INFO"

# Area of interest — full Kenya extent for ingestion
aoi:
  name: "kenya"
  # Bounding box [west, south, east, north] — full Kenya
  bbox: [33.91, -4.80, 41.91, 5.41]

# Admin boundary levels for downstream filtering and zonal stats
# Ingestion pulls country-wide data; admin_levels control what gets stats
admin_levels:
  - level: 3
    name: "wards"
    boundary_file: "boundaries/kenya_wards.geojson"
    id_field: "pcode"
    name_field: "iebc_wards"
    filter:
      field: "first_dist"
      values: ["Marsabit"]

# STAC catalog configuration
stac:
  catalog_url: "https://planetarycomputer.microsoft.com/api/stac/v1"
  requires_signing: true

# Dataset definitions — matched to feature_engineering/planetary_computer_downloader.py
#
# All collections/bands/resolutions below mirror the downloader exactly.
# Datasets in the downloader and configured here (enabled):
#     ndvi_250m, evi_250m, lai, fpar, lst_day, lst_night,
#     sr_red/nir/swir1/swir2, fire_mask/frp, et/pet,
#     s2_red/nir/swir1, s1_vv/vh,
#     dem (static), jrc_occurrence/seasonality (static), worldcover (static)
#
# Datasets NOT in the downloader — from other sources (disabled, pending team input):
#     - CHIRPS rainfall — not on Planetary Computer
#     - Soil moisture — not on Planetary Computer
#     - GPP (modis-17A2H-061) — gpp.parquet exists in S3 but was not in the downloader

datasets:
  # ── MODIS Vegetation Indices (250m, 16-day) ──────────────────────────────
  - name: "modis-ndvi"
    enabled: true
    collection: "modis-13Q1-061"
    assets: ["250m_16_days_NDVI"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 250
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "modis-evi"
    enabled: true
    collection: "modis-13Q1-061"
    assets: ["250m_16_days_EVI"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 250
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── MODIS LAI / FPAR (500m, 8-day) ──────────────────────────────────────
  - name: "modis-lai"
    enabled: true
    collection: "modis-15A2H-061"
    assets: ["Lai_500m"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "modis-fpar"
    enabled: true
    collection: "modis-15A2H-061"
    assets: ["Fpar_500m"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── MODIS Land Surface Temperature (1km, 8-day) ─────────────────────────
  - name: "modis-lst-day"
    enabled: true
    collection: "modis-11A2-061"
    assets: ["LST_Day_1km"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 1000
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "modis-lst-night"
    enabled: true
    collection: "modis-11A2-061"
    assets: ["LST_Night_1km"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 1000
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── MODIS Surface Reflectance (500m, 8-day) ─────────────────────────────
  - name: "modis-sr"
    enabled: true
    collection: "modis-09A1-061"
    assets: ["sur_refl_b01", "sur_refl_b02", "sur_refl_b06", "sur_refl_b07"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── MODIS Fire (1km, daily) ─────────────────────────────────────────────
  - name: "modis-fire"
    enabled: false
    collection: "modis-14A1-061"
    assets: ["FireMask", "MaxFRP"]
    temporal:
      lookback_days: 30
    processing:
      output_format: "cog"
      resolution_m: 1000
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── MODIS ET/PET (500m, annual gap-filled) ──────────────────────────────
  # modis-16A3GF-061 — annual composites (only version available on PC;
  # 8-day modis-16A2GF-061 was deprecated from PC — source from NASA
  # Earthdata/AppEEARS if sub-annual resolution is needed)
  - name: "modis-et"
    enabled: true
    collection: "modis-16A3GF-061"
    assets: ["ET_500m"]
    temporal:
      lookback_days: 1500
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "modis-pet"
    enabled: true
    collection: "modis-16A3GF-061"
    assets: ["PET_500m"]
    temporal:
      lookback_days: 1500
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── Sentinel-2 L2A (10-20m, 5-day revisit) ─────────────────────────────
  # Downloader uses 10m for B04/B08, 20m for B11. We use 10m for all
  # (B11 upsampled from native 20m) to match downloader resolution.
  - name: "s2-red"
    enabled: false
    collection: "sentinel-2-l2a"
    assets: ["B04"]
    query_filters:
      eo:cloud_cover:
        lt: 30
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 10
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "s2-nir"
    enabled: false
    collection: "sentinel-2-l2a"
    assets: ["B08"]
    query_filters:
      eo:cloud_cover:
        lt: 30
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 10
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "s2-swir1"
    enabled: false
    collection: "sentinel-2-l2a"
    assets: ["B11"]
    query_filters:
      eo:cloud_cover:
        lt: 30
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 20
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── Sentinel-1 GRD SAR (10m, 12-day revisit) ──────────────────────────
  - name: "s1-vv"
    enabled: false
    collection: "sentinel-1-grd"
    assets: ["vv"]
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 10
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "s1-vh"
    enabled: false
    collection: "sentinel-1-grd"
    assets: ["vh"]
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 10
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── Static datasets (one-time ingest with --full-history) ───────────────
  - name: "dem"
    enabled: false
    collection: "cop-dem-glo-30"
    assets: ["data"]
    temporal:
      lookback_days: 36500  # effectively all-time for static data
    processing:
      output_format: "cog"
      resolution_m: 30
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "jrc-water"
    enabled: false
    collection: "jrc-gsw"
    assets: ["occurrence", "seasonality"]
    temporal:
      lookback_days: 36500
    processing:
      output_format: "cog"
      resolution_m: 30
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "worldcover"
    enabled: false
    collection: "esa-worldcover"
    assets: ["map"]
    temporal:
      lookback_days: 36500
    processing:
      output_format: "cog"
      resolution_m: 10
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # GPP — gap-filled 8-day product matches v3 pipeline (modis-17A2HGF-061)
  - name: "modis-gpp"
    enabled: true
    collection: "modis-17A2HGF-061"
    assets: ["Gpp_500m"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

# Serve mode configuration
serve:
  cors_origins: ["*"]
  presigned_url_expiry_seconds: 3600
  predictions_prefix: "predictions"

# Inference configuration
# Set enabled: true to deploy Step Functions inference pipeline (triggered after each ingest).
# Set enabled: false to skip inference entirely — WFP can use this container for other workflows.
inference:
  enabled: true
  model_name: "livestock-mortality"
  model_s3_prefix: "s3://lmr-data-cogs-dev/models/inference_bundle"
  # Revert path (never deleted): s3://amazon-sagemaker-575108933641-us-east-1-c422b90ce861/dzd-ayr06tncl712p3/5t7l23o0xvt99j/shared/final_lmr_ward_results/inference_bundle
  ward_boundaries_s3_key: "models/geoBoundaries-KEN-ADM3.geojson"
  output_bucket: "lmr-data-cogs-dev"
  output_prefix: "predictions/livestock-mortality"
  boundary_file: "boundaries/kenya_wards.geojson"
  schemes:
    - biannual
    - quadseasonal
    - monthly
  feature_window_months: 36
  n_sample_points: 9
  # Source satellite parquets for feature extraction (pre-downloaded from Planetary Computer during training)
  source_data_bucket: "amazon-sagemaker-575108933641-us-east-1-c422b90ce861"
  source_data_prefix: "dzd-ayr06tncl712p3/5t7l23o0xvt99j/dev/data/training/planetary_computer"

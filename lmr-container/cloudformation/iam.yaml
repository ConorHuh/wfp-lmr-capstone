AWSTemplateFormatVersion: "2010-09-09"
Description: "LMR — IAM Roles"

Parameters:
  Environment:
    Type: String
  DataBucketArn:
    Type: String
  SageMakerBucketArn:
    Type: String
    Default: ""
    Description: "ARN of SageMaker default bucket for read-only access (optional)"

Conditions:
  HasSageMakerBucket: !Not [!Equals [!Ref SageMakerBucketArn, ""]]

Resources:
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "lmr-execution-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy


  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "lmr-task-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LMRTaskPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Ref DataBucketArn
                  - !Sub "${DataBucketArn}/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/lmr/*"
        - !If
          - HasSageMakerBucket
          - PolicyName: SageMakerBucketReadOnly
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:ListBucket
                  Resource:
                    - !Ref SageMakerBucketArn
                    - !Sub "${SageMakerBucketArn}/*"
          - !Ref "AWS::NoValue"

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "lmr-eventbridge-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunECSTask
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RunTask
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt ExecutionRole.Arn
                  - !GetAtt TaskRole.Arn

Outputs:
  TaskRoleArn:
    Value: !GetAtt TaskRole.Arn
  ExecutionRoleArn:
    Value: !GetAtt ExecutionRole.Arn
  EventBridgeRoleArn:
    Value: !GetAtt EventBridgeRole.Arn

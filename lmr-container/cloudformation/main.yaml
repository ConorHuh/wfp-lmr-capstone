AWSTemplateFormatVersion: "2010-09-09"
Description: "LMR Data Platform — Root Stack"

Parameters:
  Environment:
    Type: String
    Default: "dev"
    AllowedValues: ["dev", "staging", "prod"]
  ScheduleIntervalDays:
    Type: Number
    Default: 8
  ContainerImageTag:
    Type: String
    Default: "latest"
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "Existing VPC to deploy into"
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: "Existing subnets for Fargate tasks and ALB"
  SageMakerBucketArn:
    Type: String
    Default: ""
    Description: "ARN of SageMaker default bucket (optional)"
  SageMakerPipelineArn:
    Type: String
    Default: ""
    Description: "ARN of SageMaker pipeline to trigger on new manifests (optional)"
  SageMakerRoleArn:
    Type: String
    Default: ""
    Description: "ARN of SageMaker execution role for cross-bucket access (optional)"

Conditions:
  HasSageMakerPipeline: !Not [!Equals [!Ref SageMakerPipelineArn, ""]]

Resources:
  ECRStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./ecr.yaml
      Parameters:
        Environment: !Ref Environment

  S3Stack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./s3.yaml
      Parameters:
        Environment: !Ref Environment
        SageMakerRoleArn: !Ref SageMakerRoleArn

  IAMStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./iam.yaml
      Parameters:
        Environment: !Ref Environment
        DataBucketArn: !GetAtt S3Stack.Outputs.DataBucketArn
        SageMakerBucketArn: !Ref SageMakerBucketArn

  FargateIngestStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./fargate-ingest.yaml
      Parameters:
        Environment: !Ref Environment
        ContainerImageUri: !Sub
          - "${RepoUri}:${Tag}"
          - RepoUri: !GetAtt ECRStack.Outputs.RepositoryUri
            Tag: !Ref ContainerImageTag
        TaskRoleArn: !GetAtt IAMStack.Outputs.TaskRoleArn
        ExecutionRoleArn: !GetAtt IAMStack.Outputs.ExecutionRoleArn
        SubnetIds: !Join [",", !Ref SubnetIds]
        VpcId: !Ref VpcId

  EventBridgeStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./eventbridge.yaml
      Parameters:
        Environment: !Ref Environment
        ScheduleIntervalDays: !Ref ScheduleIntervalDays
        ClusterArn: !GetAtt FargateIngestStack.Outputs.ClusterArn
        TaskDefinitionArn: !GetAtt FargateIngestStack.Outputs.TaskDefinitionArn
        SubnetIds: !Join [",", !Ref SubnetIds]
        EventBridgeRoleArn: !GetAtt IAMStack.Outputs.EventBridgeRoleArn

  FargateServeStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./fargate-serve.yaml
      Parameters:
        Environment: !Ref Environment
        ContainerImageUri: !Sub
          - "${RepoUri}:${Tag}"
          - RepoUri: !GetAtt ECRStack.Outputs.RepositoryUri
            Tag: !Ref ContainerImageTag
        TaskRoleArn: !GetAtt IAMStack.Outputs.TaskRoleArn
        ExecutionRoleArn: !GetAtt IAMStack.Outputs.ExecutionRoleArn
        SubnetIds: !Join [",", !Ref SubnetIds]
        VpcId: !Ref VpcId
        ClusterArn: !GetAtt FargateIngestStack.Outputs.ClusterArn

  SageMakerTriggerStack:
    Type: AWS::CloudFormation::Stack
    Condition: HasSageMakerPipeline
    Properties:
      TemplateURL: ./sagemaker-trigger.yaml
      Parameters:
        Environment: !Ref Environment
        SageMakerPipelineArn: !Ref SageMakerPipelineArn
        DataBucketName: !GetAtt S3Stack.Outputs.DataBucketName

Outputs:
  ECRRepositoryUri:
    Value: !GetAtt ECRStack.Outputs.RepositoryUri
  DataBucketName:
    Value: !GetAtt S3Stack.Outputs.DataBucketName
  ClusterArn:
    Value: !GetAtt FargateIngestStack.Outputs.ClusterArn
  ALBDnsName:
    Value: !GetAtt FargateServeStack.Outputs.ALBDnsName

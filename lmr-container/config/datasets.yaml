# datasets.yaml — LMR Data Platform Configuration

# Global settings
global:
  region: "us-east-1"
  schedule_interval_days: 8
  s3_bucket: "lmr-data-cogs-dev"
  s3_prefix: "ingested"
  log_level: "INFO"

# Area of interest — full Kenya extent for ingestion
aoi:
  name: "kenya"
  # Bounding box [west, south, east, north] — full Kenya
  bbox: [33.91, -4.80, 41.91, 5.41]

# Admin boundary levels for downstream filtering and zonal stats
# Ingestion pulls country-wide data; admin_levels control what gets stats
admin_levels:
  - level: 3
    name: "wards"
    boundary_file: "boundaries/kenya_wards.geojson"
    id_field: "pcode"
    name_field: "iebc_wards"
    filter:
      field: "first_dist"
      values: ["Marsabit"]

# STAC catalog configuration
stac:
  catalog_url: "https://planetarycomputer.microsoft.com/api/stac/v1"
  requires_signing: true

# Dataset definitions — matched to feature_engineering/planetary_computer_downloader.py
#
# All collections/bands/resolutions below mirror the downloader exactly.
# Datasets in the downloader and configured here (enabled):
#     ndvi_250m, evi_250m, lai, fpar, lst_day, lst_night,
#     sr_red/nir/swir1/swir2, fire_mask/frp, et/pet,
#     s2_red/nir/swir1, s1_vv/vh,
#     dem (static), jrc_occurrence/seasonality (static), worldcover (static)
#
# Datasets NOT in the downloader — from other sources (disabled, pending team input):
#     - CHIRPS rainfall — not on Planetary Computer
#     - Soil moisture — not on Planetary Computer
#     - GPP (modis-17A2H-061) — gpp.parquet exists in S3 but was not in the downloader

datasets:
  # ── MODIS Vegetation Indices (250m, 16-day) ──────────────────────────────
  - name: "modis-ndvi"
    enabled: true
    collection: "modis-13Q1-061"
    assets: ["250m_16_days_NDVI"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 250
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "modis-evi"
    enabled: true
    collection: "modis-13Q1-061"
    assets: ["250m_16_days_EVI"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 250
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── MODIS LAI / FPAR (500m, 8-day) ──────────────────────────────────────
  - name: "modis-lai"
    enabled: true
    collection: "modis-15A2H-061"
    assets: ["Lai_500m"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "modis-fpar"
    enabled: true
    collection: "modis-15A2H-061"
    assets: ["Fpar_500m"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── MODIS Land Surface Temperature (1km, 8-day) ─────────────────────────
  - name: "modis-lst-day"
    enabled: true
    collection: "modis-11A2-061"
    assets: ["LST_Day_1km"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 1000
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "modis-lst-night"
    enabled: true
    collection: "modis-11A2-061"
    assets: ["LST_Night_1km"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 1000
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── MODIS Surface Reflectance (500m, 8-day) ─────────────────────────────
  - name: "modis-sr"
    enabled: true
    collection: "modis-09A1-061"
    assets: ["sur_refl_b01", "sur_refl_b02", "sur_refl_b06", "sur_refl_b07"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── MODIS Fire (1km, daily) ─────────────────────────────────────────────
  - name: "modis-fire"
    enabled: false
    collection: "modis-14A1-061"
    assets: ["FireMask", "MaxFRP"]
    temporal:
      lookback_days: 30
    processing:
      output_format: "cog"
      resolution_m: 1000
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── MODIS ET/PET (500m, yearly gap-filled) ──────────────────────────────
  # modis-16A3GF-061 — annual composites (only version on PC)
  - name: "modis-et"
    enabled: true
    collection: "modis-16A3GF-061"
    assets: ["ET_500m"]
    temporal:
      lookback_days: 1500  # yearly product — lookback covers 3+ years
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "modis-pet"
    enabled: true
    collection: "modis-16A3GF-061"
    assets: ["PET_500m"]
    temporal:
      lookback_days: 400
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── Sentinel-2 L2A (10-20m, 5-day revisit) ─────────────────────────────
  # Downloader uses 10m for B04/B08, 20m for B11. We use 10m for all
  # (B11 upsampled from native 20m) to match downloader resolution.
  - name: "s2-red"
    enabled: false
    collection: "sentinel-2-l2a"
    assets: ["B04"]
    query_filters:
      eo:cloud_cover:
        lt: 30
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 10
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "s2-nir"
    enabled: false
    collection: "sentinel-2-l2a"
    assets: ["B08"]
    query_filters:
      eo:cloud_cover:
        lt: 30
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 10
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "s2-swir1"
    enabled: false
    collection: "sentinel-2-l2a"
    assets: ["B11"]
    query_filters:
      eo:cloud_cover:
        lt: 30
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 20
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── Sentinel-1 GRD SAR (10m, 12-day revisit) ──────────────────────────
  - name: "s1-vv"
    enabled: false
    collection: "sentinel-1-grd"
    assets: ["vv"]
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 10
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "s1-vh"
    enabled: false
    collection: "sentinel-1-grd"
    assets: ["vh"]
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 10
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── Static datasets (one-time ingest with --full-history) ───────────────
  - name: "dem"
    enabled: false
    collection: "cop-dem-glo-30"
    assets: ["data"]
    temporal:
      lookback_days: 36500  # effectively all-time for static data
    processing:
      output_format: "cog"
      resolution_m: 30
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "jrc-water"
    enabled: false
    collection: "jrc-gsw"
    assets: ["occurrence", "seasonality"]
    temporal:
      lookback_days: 36500
    processing:
      output_format: "cog"
      resolution_m: 30
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "worldcover"
    enabled: false
    collection: "esa-worldcover"
    assets: ["map"]
    temporal:
      lookback_days: 36500
    processing:
      output_format: "cog"
      resolution_m: 10
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # ── Datasets NOT in the downloader — from other sources (disabled) ─────
  - name: "rainfall-chirps"
    enabled: false  # not on Planetary Computer — needs alternate source
    collection: "chirps-daily"
    assets: ["precip"]
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 5000
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  - name: "soil-moisture"
    enabled: false  # not on Planetary Computer — needs alternate source
    collection: "smap-l3"
    assets: ["soil_moisture"]
    temporal:
      lookback_days: 16
    processing:
      output_format: "cog"
      resolution_m: 9000
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

  # GPP is on PC (modis-17A2H-061) and gpp.parquet exists in S3,
  # but was not in the downloader COLLECTIONS dict — added separately by team
  - name: "modis-gpp"
    enabled: true
    collection: "modis-17A2H-061"
    assets: ["Gpp_500m"]
    temporal:
      lookback_days: 1100
    processing:
      output_format: "cog"
      resolution_m: 500
      crs: "EPSG:4326"
    s3_key_template: "{prefix}/{dataset}/{date}/{asset}.tif"

# Serve mode configuration
serve:
  cors_origins: ["*"]
  presigned_url_expiry_seconds: 3600
  predictions_prefix: "predictions"

# External bucket references (read-only access)
external_buckets:
  sagemaker:
    name: "amazon-sagemaker-575108933641-us-east-1-c422b90ce861"
    region: "us-east-1"
    purpose: "SageMaker default bucket — model artifacts and training data"

# Inference configuration
inference:
  model_name: "livestock-mortality"
  output_bucket: "lmr-data-cogs-dev"
  output_prefix: "predictions/livestock-mortality"
  boundary_file: "boundaries/kenya_wards.geojson"
  ssm_prefix: "/lmr/model"

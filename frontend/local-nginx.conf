server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Browser hits localhost:3000 for the SPA, localhost:8000 for the API.
    # No reverse proxy needed for that split — the API URLs in layers.json
    # already point at localhost:8000 (substituted at image build time).
    # This block is kept simple: serve static + SPA fallback.

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed asset bundles
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
